spring:
  datasource:
    url: jdbc:mysql://localhost:3306/magic_db?createDatabaseIfNotExist=true
    username: ${DB_USERNAME}          # Do NOT hardcode
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update               # Creates tables automatically
    show-sql: true